cache:
  paths:
    - .cache/pip
    - venv/

.dockerignore_template: &dockerignore_template .git
  .gitignore
  README.md
  Dockerfile
  .dockerignore
  .gitlab-ci.yml
  tests/
  .pytest_cache/
  __pycache__/
  "*.pyc"
