stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  MONGO_URL: "mongodb://mongo:27017/fastapi_db"

services:
  - docker:20.10.16-dind

before_script:
  - docker info
  - docker --version

build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - echo "开始构建Docker镜像..."
    - docker build -t fastapi-app:latest .
    - docker tag fastapi-app:latest $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker tag fastapi-app:latest $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - develop
  artifacts:
    reports:
      dotenv: build.env

deploy:
  stage: deploy
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - echo "开始部署..."
    - docker-compose down
    - docker-compose up -d --build
  environment:
    name: production
    url: http://localhost:8080
  only:
    - main
  when: manual

